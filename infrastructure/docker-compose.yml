services:

  grace-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: grace-backend
    # Loopback-only binding so the API is reachable from this host but
    # never from outside, even when Docker is run on a public VM. The
    # production overlay adds Caddy in front; Caddy reaches the backend
    # via the Docker network (grace-backend:8000), not via this binding.
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - grace-data:/app/data/db
      - ../prompt-library:/prompt-library:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  grace-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: grace-frontend
    # See grace-backend above. Loopback-only by design; Caddy in the
    # production overlay reverse-proxies to grace-frontend:8501 over
    # the Docker network. Local dev still works via http://localhost:8501.
    ports:
      - "127.0.0.1:8501:8501"
    environment:
      - GRACE_API_URL=http://grace-backend:8000
    depends_on:
      grace-backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  grace-data:
    driver: local
